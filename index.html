<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 24px;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #e0e0e0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 700px;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #555; }
    input::placeholder { color: #444; }

    button {
      padding: 12px 22px;
      background: #222;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #2e2e2e; }

    .player-wrapper {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1e1e1e;
      display: none;
    }

    video {
      width: 100%;
      height: 100%;
      background: #000;
    }

    .title {
      font-size: 1rem;
      color: #ccc;
      max-width: 900px;
      width: 100%;
      display: none;
    }

    .error {
      color: #e57373;
      font-size: 0.85rem;
      display: none;
      max-width: 700px;
      text-align: center;
    }

    .loading {
      color: #555;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>
<body>

  <h1>▶ Video Player</h1>

  <div class="input-row">
    <input type="text" id="url-input" placeholder="Paste a YouTube URL..." />
    <button onclick="loadVideo()">Play</button>
  </div>

  <p class="loading" id="loading">Fetching video...</p>
  <p class="error" id="error-msg">Couldn't load that video. Make sure it's a valid YouTube URL.</p>

  <p class="title" id="video-title"></p>

  <div class="player-wrapper" id="player-wrapper">
    <video id="player" controls autoplay></video>
  </div>

  <script>
    const WORKER_URL = "https://happypeopleunite.aadis-55d.workers.dev";

    function extractVideoId(url) {
      url = url.trim();
      let match = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
      if (match) return match[1];
      match = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
      if (match) return match[1];
      match = url.match(/\/embed\/([a-zA-Z0-9_-]{11})/);
      if (match) return match[1];
      match = url.match(/\/shorts\/([a-zA-Z0-9_-]{11})/);
      if (match) return match[1];
      if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
      return null;
    }

    async function loadVideo() {
      const input = document.getElementById('url-input').value;
      const error = document.getElementById('error-msg');
      const loading = document.getElementById('loading');
      const wrapper = document.getElementById('player-wrapper');
      const player = document.getElementById('player');
      const titleEl = document.getElementById('video-title');

      const videoId = extractVideoId(input);

      if (!videoId) {
        error.textContent = "Couldn't find a video ID in that URL. Try a standard YouTube link.";
        error.style.display = 'block';
        return;
      }

      error.style.display = 'none';
      wrapper.style.display = 'none';
      titleEl.style.display = 'none';
      loading.style.display = 'block';

      try {
        const res = await fetch(`${WORKER_URL}/?v=${videoId}`);
        const data = await res.json();

        if (!data.url) throw new Error("No URL");

        player.src = data.url;
        titleEl.textContent = data.title;
        titleEl.style.display = 'block';
        wrapper.style.display = 'block';
        loading.style.display = 'none';
        wrapper.scrollIntoView({ behavior: 'smooth' });
      } catch (e) {
        loading.style.display = 'none';
        error.textContent = "Couldn't load that video. It may be age-restricted or unavailable.";
        error.style.display = 'block';
      }
    }

    document.getElementById('url-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadVideo();
    });
  </script>

</body>
</html>
